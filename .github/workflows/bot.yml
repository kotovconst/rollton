name: bot

on:
  pull_request:
    paths: ['bot/**']
  push:
    branches: [main]
    paths: ['bot/**']

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: bot/go.sum

      - run: go vet ./...
      - run: go test -race -short ./...

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push rolltonchatbot
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          file: ./bot/Dockerfile
          platforms: linux/arm64
          build-args: BOT=rolltonchatbot
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rollton-rolltonchatbot:latest
            ghcr.io/${{ github.repository_owner }}/rollton-rolltonchatbot:${{ github.sha }}

      - name: Build & push admin
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          file: ./bot/Dockerfile
          platforms: linux/arm64
          build-args: BOT=admin
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rollton-admin:latest
            ghcr.io/${{ github.repository_owner }}/rollton-admin:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/rollton
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
